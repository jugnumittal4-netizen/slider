<!DOCTYPE html>
<html>
    <body>
        <section>
            <h1>corrosoul</h1>
            <img class = "myslides" src = "f1.jpg" style = "height:auto;">
            <img class = "myslides" src = "f2.jpeg" style = "height:auto;">
            <img class = "myslides" src = "f3.jpeg" style = "height:auto;">
            <img class = "myslides" src = "f4.jpeg" style = "height:auto;">
            <img class = "myslides" src = "f5.jpeg" style = "height:auto;">
        </section>
        <script>
            //++ means incrementing the value of myindex by 1
            var myindex = 0;
            corousel();
            function corousel(){
                var i;
                var x = document.getElementsByClassName("myslides");
                for(i=0; i<x.length; i++){
                    x[i].style.display = "none";
                }
                myindex++;
                if(myindex > x.length){
                    myindex = 1
                }
                x[myindex-1].style.display = "block";
                setTimeout(corousel, 3000);
            }
            </script>
    </body>
</html>
